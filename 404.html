<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script>
    // GitHub Pages SPA redirect
    // Detecte automatiquement si on est sur un domaine perso ou sous /repo/
    var path = location.pathname + location.search;
    var isCustomDomain = (location.hostname !== 'maher-mme.github.io');
    if (isCustomDomain) {
      // Domaine perso (virus.solyntek.io) : base = /
      sessionStorage.setItem('spa_redirect', path || '/');
      location.replace('/' + location.search);
    } else {
      // GitHub Pages (maher-mme.github.io/virus/) : base = /virus/
      var repo = '/virus';
      sessionStorage.setItem('spa_redirect', path.replace(repo, '') || '/');
      location.replace(repo + '/' + location.search);
    }
  </script>
</head>
<body></body>
</html>
