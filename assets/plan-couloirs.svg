<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <!-- Fond = mur -->
  <rect width="800" height="600" fill="#2c2c2c"/>

  <!-- GRAND ESPACE FONTAINE (place centrale pour les reunions) -->
  <rect x="310" y="210" width="180" height="160" fill="#d4c9a8" rx="10"/>

  <!-- FONTAINE -->
  <circle cx="400" cy="290" r="25" fill="#5dade2" stroke="#85c1e9" stroke-width="2"/>
  <text x="400" y="293" font-size="5" fill="white" text-anchor="middle" font-weight="bold">FONTAINE</text>

  <!-- === COULOIRS === -->
  <!-- Couloir gauche vertical (entre les boutiques gauche, a leur droite) -->
  <rect x="60" y="6" width="25" height="508" fill="#d4c9a8"/>

  <!-- Couloir droite vertical (entre les boutiques droite, a leur gauche) -->
  <rect x="710" y="6" width="25" height="508" fill="#d4c9a8"/>

  <!-- Couloir haut horizontal : gauche → centre haut (passe SOUS les boutiques haut) -->
  <path d="M85,45 L270,45 L270,40 L270,45 L310,45" stroke="#d4c9a8" stroke-width="25" fill="none" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Couloir haut centre : entre SECURITE/WC/CAFE (passe en dessous) -->
  <path d="M270,45 L270,42" stroke="#d4c9a8" stroke-width="25" fill="none"/>
  <rect x="270" y="38" width="160" height="25" fill="#d4c9a8"/>

  <!-- Couloir haut droite : CAFE → BIJOUTERIE -->
  <path d="M430,45 L710,45" stroke="#d4c9a8" stroke-width="25" fill="none" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Couloir haut → fontaine (descend depuis le milieu haut vers la place) -->
  <rect x="388" y="60" width="25" height="150" fill="#d4c9a8"/>

  <!-- Couloir gauche → fontaine (horizontal, passe entre SPORT et ANIMALERIE) -->
  <path d="M85,195 L150,195 L150,290 L310,290" stroke="#d4c9a8" stroke-width="25" fill="none" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Couloir droite → fontaine (horizontal, passe entre RESTAURANT et BIO) -->
  <path d="M710,200 L650,200 L650,290 L490,290" stroke="#d4c9a8" stroke-width="25" fill="none" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Couloir KIOSQUE (depuis couloir gauche, contourne par le haut) -->
  <path d="M150,195 L150,140 L240,140" stroke="#d4c9a8" stroke-width="25" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Couloir KIOSQUE → fontaine -->
  <path d="M320,140 L388,140 L388,210" stroke="#d4c9a8" stroke-width="25" fill="none" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Couloir OPTICIEN (depuis couloir droite, contourne par le haut) -->
  <path d="M650,200 L650,140 L520,140" stroke="#d4c9a8" stroke-width="25" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Couloir OPTICIEN → fontaine -->
  <path d="M440,140 L413,140 L413,210" stroke="#d4c9a8" stroke-width="25" fill="none" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Couloir fontaine → bas (descend vers ARCADE/BOWLING) -->
  <rect x="388" y="370" width="25" height="80" fill="#d4c9a8"/>

  <!-- Couloir ARCADE (depuis couloir gauche bas) -->
  <path d="M150,400 L240,400" stroke="#d4c9a8" stroke-width="25" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Couloir gauche bas → fontaine bas -->
  <path d="M85,400 L150,400 L150,350 L310,350" stroke="#d4c9a8" stroke-width="25" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Fontaine bas → place -->
  <rect x="310" y="338" width="25" height="32" fill="#d4c9a8"/>

  <!-- Couloir ARCADE → fontaine bas -->
  <path d="M320,400 L388,400 L388,450" stroke="#d4c9a8" stroke-width="25" fill="none" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Couloir BOWLING → fontaine bas -->
  <path d="M440,400 L520,400" stroke="#d4c9a8" stroke-width="25" fill="none" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Couloir BOWLING → droite → FOOD COURT -->
  <path d="M520,400 L650,400 L650,350 L710,350" stroke="#d4c9a8" stroke-width="25" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Fontaine bas droite -->
  <path d="M490,350 L650,350" stroke="#d4c9a8" stroke-width="25" fill="none" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Couloir bas horizontal : JEUX VIDEO → MEUBLES → serpente → VOYAGE -->
  <path d="M85,450 L200,450 L200,490 L600,490 L600,450 L710,450" stroke="#d4c9a8" stroke-width="25" fill="none" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- === BOUTIQUES === -->
  <!-- Gauche -->
  <rect x="6" y="6" width="50" height="40" fill="#8e44ad" rx="2"/><text x="31" y="30" font-size="5" fill="white" text-anchor="middle">MODE</text>
  <rect x="6" y="55" width="50" height="35" fill="#3498db" rx="2"/><text x="31" y="77" font-size="5" fill="white" text-anchor="middle">PHARMA</text>
  <rect x="6" y="100" width="50" height="35" fill="#e67e22" rx="2"/><text x="31" y="122" font-size="5" fill="white" text-anchor="middle">LIBRAIRIE</text>
  <rect x="6" y="145" width="50" height="40" fill="#27ae60" rx="2"/><text x="31" y="169" font-size="5" fill="white" text-anchor="middle">SPORT</text>
  <rect x="6" y="210" width="50" height="40" fill="#e74c3c" rx="2"/><text x="31" y="234" font-size="5" fill="white" text-anchor="middle">ANIMAL</text>
  <rect x="6" y="260" width="50" height="40" fill="#f39c12" rx="2"/><text x="31" y="284" font-size="5" fill="white" text-anchor="middle">PATISS.</text>
  <rect x="6" y="320" width="50" height="50" fill="#1abc9c" rx="2"/><text x="31" y="349" font-size="4" fill="white" text-anchor="middle">SUPERMAR.</text>
  <rect x="6" y="380" width="50" height="35" fill="#9b59b6" rx="2"/><text x="31" y="400" font-size="4" fill="white" text-anchor="middle">JEUX VIDEO</text>
  <rect x="6" y="470" width="50" height="40" fill="#c0392b" rx="2"/><text x="31" y="494" font-size="5" fill="white" text-anchor="middle">MEUBLES</text>

  <!-- Centre haut -->
  <rect x="275" y="6" width="45" height="25" fill="#2ecc71" rx="2"/><text x="298" y="22" font-size="4" fill="white" text-anchor="middle">SECURITE</text>
  <rect x="330" y="6" width="35" height="25" fill="#e74c3c" rx="2"/><text x="348" y="22" font-size="4" fill="white" text-anchor="middle">WC</text>
  <rect x="375" y="6" width="45" height="25" fill="#f39c12" rx="2"/><text x="398" y="22" font-size="5" fill="white" text-anchor="middle">CAFE</text>

  <!-- Centre -->
  <rect x="245" y="120" width="60" height="35" fill="#95a5a6" rx="2"/><text x="275" y="142" font-size="5" fill="white" text-anchor="middle">KIOSQUE</text>
  <rect x="455" y="120" width="60" height="35" fill="#2980b9" rx="2"/><text x="485" y="142" font-size="5" fill="white" text-anchor="middle">OPTICIEN</text>

  <!-- Centre bas -->
  <rect x="245" y="385" width="60" height="35" fill="#e67e22" rx="2"/><text x="275" y="407" font-size="5" fill="white" text-anchor="middle">ARCADE</text>
  <rect x="455" y="385" width="60" height="35" fill="#d4ac0d" rx="2"/><text x="485" y="407" font-size="5" fill="white" text-anchor="middle">BOWLING</text>

  <!-- Droite -->
  <rect x="740" y="6" width="54" height="40" fill="#d4ac0d" rx="2"/><text x="767" y="30" font-size="5" fill="white" text-anchor="middle">BIJOUT.</text>
  <rect x="740" y="55" width="54" height="35" fill="#2980b9" rx="2"/><text x="767" y="77" font-size="5" fill="white" text-anchor="middle">TECH</text>
  <rect x="740" y="100" width="54" height="45" fill="#c0392b" rx="2"/><text x="767" y="127" font-size="5" fill="white" text-anchor="middle">CINEMA</text>
  <rect x="740" y="155" width="54" height="35" fill="#16a085" rx="2"/><text x="767" y="177" font-size="5" fill="white" text-anchor="middle">RESTAU</text>
  <rect x="740" y="210" width="54" height="40" fill="#27ae60" rx="2"/><text x="767" y="234" font-size="5" fill="white" text-anchor="middle">BIO</text>
  <rect x="740" y="260" width="54" height="40" fill="#8e44ad" rx="2"/><text x="767" y="284" font-size="5" fill="white" text-anchor="middle">THE</text>
  <rect x="740" y="320" width="54" height="50" fill="#e74c3c" rx="2"/><text x="767" y="349" font-size="4" fill="white" text-anchor="middle">FOOD COURT</text>
  <rect x="740" y="380" width="54" height="30" fill="#e67e22" rx="2"/><text x="767" y="399" font-size="4" fill="white" text-anchor="middle">SPORT ART.</text>
  <rect x="740" y="420" width="54" height="30" fill="#9b59b6" rx="2"/><text x="767" y="439" font-size="5" fill="white" text-anchor="middle">PARFUM.</text>
  <rect x="740" y="470" width="54" height="40" fill="#3498db" rx="2"/><text x="767" y="494" font-size="5" fill="white" text-anchor="middle">VOYAGE</text>

  <!-- Legende -->
  <rect x="10" y="550" width="780" height="45" fill="#1a1a2e" rx="5"/>
  <rect x="20" y="565" width="15" height="10" fill="#d4c9a8" rx="2"/>
  <text x="40" y="574" font-size="7" fill="white">Couloir</text>
  <rect x="90" y="565" width="15" height="10" fill="#2c2c2c" stroke="#555" stroke-width="0.5" rx="2"/>
  <text x="110" y="574" font-size="7" fill="white">Mur</text>
  <circle cx="165" cy="570" r="5" fill="#5dade2"/>
  <text x="175" y="574" font-size="7" fill="white">Fontaine + Place</text>
  <rect x="270" y="565" width="15" height="10" fill="#8e44ad" rx="2"/>
  <text x="290" y="574" font-size="7" fill="white">Boutique</text>
</svg>
